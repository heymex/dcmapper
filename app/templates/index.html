<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dcmapper</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>dcmapper</h1>
      <p>Known local datacenter-related facilities and jurisdiction moratoriums/bans</p>
    </header>
    <main>
      <div id="map"></div>
      <div class="map-legend" aria-label="Map legend">
        <div class="legend-title">Restrictions</div>
        <div class="legend-item"><span class="swatch moratorium"></span> Moratorium (active)</div>
        <div class="legend-item"><span class="swatch proposed"></span> Proposed / pending</div>
        <div class="legend-item"><span class="swatch ban"></span> Permanent ban</div>
        <div class="legend-item"><span class="swatch facility"></span> Known facility</div>
      </div>
    </main>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="/static/js/map.js?v=3"></script>
  </body>
</html>
